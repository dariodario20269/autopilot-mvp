[build]
command = "pnpm install --no-frozen-lockfile && pnpm exec vite build && pnpm exec esbuild server/_core/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist"
functions = "netlify/functions"
publish = "dist/public"

[build.environment]
NODE_VERSION = "22"
NODE_ENV = "production"
PNPM_FLAGS = "--no-frozen-lockfile"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
